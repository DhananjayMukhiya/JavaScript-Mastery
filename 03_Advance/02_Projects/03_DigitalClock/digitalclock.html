<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Digital Clock</title>

  <!-- CSS Link -->
  <link rel="stylesheet" href="digitalclock.css">
</head>
<body>

  <div class="container">
    <h2>Digital Clock</h2>

    <div class="clock">
      <span id="hours">00</span> :
      <span id="minutes">00</span> :
      <span id="seconds">00</span>
    </div>

    <div id="ampm">AM</div>
  </div>

  <!-- JS Link -->
  <script src="digitalclock.js"></script>
</body>
</html>
