<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Check</title>
    <style>
        /* Reset default styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Body styling */
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        /* Main container */
        .project {
            background: #ffffff;
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        /* Insert container */
        .insert {
            text-align: center;
        }

        /* Key display box */
        .key {
            font-size: 24px;
            font-weight: 600;
            color: #333;
            padding: 20px 30px;
            border: 2px dashed #667eea;
            border-radius: 12px;
            background-color: #f5f7ff;
            transition: all 0.3s ease;
        }

        /* Hover effect */
        .key:hover {
            background-color: #667eea;
            color: #fff;
            transform: scale(1.05);
        }

        /* Table styling */
        .color {
            margin-top: 20px;
            border-collapse: collapse;
            width: 100%;
            text-align: center;
            font-size: 18px;
            overflow: hidden;
            border-radius: 12px;
        }

        /* Table header */
        .color th {
            background-color: #667eea;
            color: white;
            padding: 12px;
            font-weight: 600;
        }

        /* Table cells */
        .color td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            color: #333;
        }
    </style>
</head>

<body>
    <div class="project">
        <div class="insert">
            <div class="key">Press the key and watch magic</div>
        </div>
    </div>

    <script src="04_keyboardcheck.js"></script>
</body>

</html>
